basePath: /
definitions:
  handler.CreateVehicleRequest:
    type: object
  handler.ErrorResponse:
    properties:
      detail:
        type: string
      error:
        type: string
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.LoginResponse:
    properties:
      access_token:
        type: string
      avatar_url:
        type: string
      display_name:
        type: string
      email:
        type: string
      expires_in:
        type: integer
      id:
        type: string
      refresh_token:
        type: string
      username:
        type: string
    type: object
  handler.MessageResponse:
    properties:
      message:
        type: string
    type: object
  handler.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
    type: object
  handler.RegisterRequest:
    properties:
      display_name:
        maxLength: 100
        minLength: 1
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - display_name
    - email
    - password
    - username
    type: object
  handler.RegisterResponse:
    properties:
      access_token:
        type: string
      avatar_url:
        type: string
      display_name:
        type: string
      email:
        type: string
      expires_in:
        type: integer
      id:
        type: string
      refresh_token:
        type: string
      username:
        type: string
    type: object
  handler.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      display_name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  handler.UpdateVehicleRequest:
    type: object
  handler.UserProfileResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  handler.VehicleResponse:
    properties:
      brand:
        type: string
      color:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
host: api.trackride.app
info:
  contact:
    name: TrackRide Support
    url: https://github.com/nashirabbash/trackride
  description: Backend API for the TrackRide mobile application. Provides user authentication,
    vehicle tracking, ride logging, and social features.
  license:
    name: MIT
    url: https://github.com/nashirabbash/trackride/blob/master/LICENSE.txt
  title: TrackRide API
  version: 1.0.0
paths:
  /health:
    get:
      description: Returns the health status of the API server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: Health check
      tags:
      - Health
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and receive access and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.LoginResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /v1/auth/logout:
    post:
      description: 'Logout the authenticated user. Note: For MVP, this is stateless
        and the client should discard the token.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange refresh token for a new access token
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.RefreshResponse'
        "401":
          description: Invalid refresh token
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and receive access and refresh tokens
      parameters:
      - description: Registration credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.RegisterResponse'
        "409":
          description: Email or username already taken
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /v1/feed:
    get:
      description: Retrieve rides from users you are following, with pagination and
        user's like status
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page, max 100 (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user feed
      tags:
      - Social
  /v1/leaderboard:
    get:
      description: Retrieve the global leaderboard with optional filtering by vehicle
        type and period
      parameters:
      - description: 'Period type: ''weekly'' or ''monthly'' (default: weekly)'
        in: query
        name: period_type
        type: string
      - description: 'Filter by vehicle: ''motor'', ''mobil'', or ''sepeda'''
        in: query
        name: vehicle_type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page, max 100 (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get global leaderboard
      tags:
      - Leaderboard
  /v1/leaderboard/friends:
    get:
      description: Retrieve leaderboard rankings for users you follow, with optional
        filtering by vehicle type and period
      parameters:
      - description: 'Period type: ''weekly'' or ''monthly'' (default: weekly)'
        in: query
        name: period_type
        type: string
      - description: 'Filter by vehicle: ''motor'', ''mobil'', or ''sepeda'''
        in: query
        name: vehicle_type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page, max 100 (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get friends leaderboard
      tags:
      - Leaderboard
  /v1/rides:
    get:
      description: Retrieve completed rides with pagination and optional filtering
        by vehicle type
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page, max 100 (default: 20)'
        in: query
        name: limit
        type: integer
      - description: Filter by vehicle type (motor, mobil, sepeda)
        in: query
        name: vehicle_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List user rides
      tags:
      - Rides
  /v1/rides/{id}:
    get:
      description: Retrieve detailed information about a specific ride
      parameters:
      - description: Ride ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Ride not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get ride details
      tags:
      - Rides
  /v1/rides/{id}/comments:
    post:
      consumes:
      - application/json
      description: Add a comment to a ride. If the ride owner has push notifications
        enabled, a notification is sent.
      parameters:
      - description: Ride ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      - description: Comment data (content required, max 280 chars)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Ride not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Comment on a ride
      tags:
      - Social
  /v1/rides/{id}/like:
    post:
      description: Like another user's ride. If this is a new like and the ride owner
        has push notifications enabled, a notification is sent.
      parameters:
      - description: Ride ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Ride not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Like a ride
      tags:
      - Social
  /v1/rides/{id}/stop:
    post:
      description: Stop an active ride and compute metrics (distance, duration, calories,
        elevation gain)
      parameters:
      - description: Ride ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Ride not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stop a ride
      tags:
      - Rides
  /v1/rides/start:
    post:
      consumes:
      - application/json
      description: Create and start a new ride for a specific vehicle. Returns a ws_token
        for WebSocket connection.
      parameters:
      - description: Ride start data (vehicle_id required, title optional)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Vehicle not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Start a new ride
      tags:
      - Rides
  /v1/users/{id}:
    get:
      description: Retrieve a public user profile. Does not return email address.
      parameters:
      - description: User ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user profile by ID
      tags:
      - Users
  /v1/users/{id}/follow:
    delete:
      description: Stop following another user
      parameters:
      - description: User ID to unfollow (UUID format)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unfollow a user
      tags:
      - Social
    post:
      description: Follow another user to see their rides in your feed
      parameters:
      - description: User ID to follow (UUID format)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Invalid ID or cannot follow self
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Follow a user
      tags:
      - Social
  /v1/users/me:
    get:
      description: Retrieve the authenticated user's complete profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update the authenticated user's display name and/or avatar URL
      parameters:
      - description: Profile update data (all fields optional)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - Users
  /v1/vehicles:
    get:
      description: Retrieve all vehicles owned by the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.VehicleResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List user vehicles
      tags:
      - Vehicles
    post:
      consumes:
      - application/json
      description: 'Create a new vehicle for the authenticated user. Type must be
        one of: motor, mobil, sepeda'
      parameters:
      - description: Vehicle data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateVehicleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.VehicleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create new vehicle
      tags:
      - Vehicles
  /v1/vehicles/{id}:
    delete:
      description: Delete a vehicle owned by the authenticated user. Cannot delete
        if vehicle is in use in active rides.
      parameters:
      - description: Vehicle ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Vehicle not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: Vehicle is in use
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete vehicle
      tags:
      - Vehicles
    put:
      consumes:
      - application/json
      description: Update a vehicle owned by the authenticated user. All fields are
        optional.
      parameters:
      - description: Vehicle ID (UUID format)
        in: path
        name: id
        required: true
        type: string
      - description: Vehicle update data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateVehicleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.VehicleResponse'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Vehicle not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update vehicle
      tags:
      - Vehicles
schemes:
- https
securityDefinitions:
  BearerAuth:
    description: 'JWT Bearer token authentication. Pass as "Authorization: Bearer
      <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
